<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>USMNT — World Cup 2026</title>
<style>
  :root{
    --bg:#0b1020;--card:#121a32;--ink:#eef1ff;--mute:#94a3b8;
    --red:#bf0a30;--white:#fff;--blue:#002868;--accent:#3b82f6;
    --win:#16a34a;--loss:#ef4444;--draw:#a3a3a3;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);background:linear-gradient(180deg,#070b1c,#0b1020 40%,#0b1020);min-height:100vh}
  header{padding:28px 24px;border-bottom:1px solid #1f2a4a;background:
    linear-gradient(90deg,var(--blue),#0b1020 60%,var(--red));}
  h1{margin:0;font-size:28px;letter-spacing:.5px}
  header p{margin:6px 0 0;color:var(--mute)}
  nav{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}
  nav button{background:#1b2547;color:var(--ink);border:1px solid #2a3a72;
    padding:8px 14px;border-radius:999px;cursor:pointer;font-weight:600}
  nav button.active{background:var(--accent);border-color:var(--accent)}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;
    box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:pulse 1.6s infinite;margin-right:6px;vertical-align:middle}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .refresh-info{color:var(--mute);font-size:12px;margin-left:auto}
  main{max-width:1100px;margin:0 auto;padding:24px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{background:var(--card);border:1px solid #1f2a4a;border-radius:14px;padding:14px 16px;
    box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .date{color:var(--mute);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
  .stage{font-size:11px;color:#cbd5e1;background:#1f2a4a;border-radius:999px;padding:3px 8px}
  .match{font-size:20px;font-weight:700;margin:8px 0 4px}
  .venue{color:var(--mute);font-size:13px}
  .pill{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .W{background:rgba(22,163,74,.15);color:#86efac}
  .L{background:rgba(239,68,68,.15);color:#fca5a5}
  .D{background:rgba(163,163,163,.2);color:#e5e7eb}
  .upcoming{background:rgba(59,130,246,.15);color:#bfdbfe}
  .live{background:rgba(239,68,68,.2);color:#fecaca}
  .bracket{display:flex;gap:24px;overflow-x:auto;padding:8px 4px}
  .round{display:flex;flex-direction:column;gap:18px;min-width:200px;justify-content:space-around}
  .round h3{margin:0 0 4px;font-size:12px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em}
  .tie{background:var(--card);border:1px solid #1f2a4a;border-radius:10px;padding:8px 10px;font-size:13px}
  .tie .t{display:flex;justify-content:space-between}
  footer{color:var(--mute);text-align:center;padding:24px;font-size:12px}
  .section-h{display:flex;align-items:baseline;justify-content:space-between;margin:8px 4px 14px}
  .section-h h2{margin:0;font-size:18px}
  .next{border:1px solid var(--accent);box-shadow:0 0 0 1px rgba(59,130,246,.35), 0 6px 24px rgba(0,0,0,.3)}
  .countdown{font-variant-numeric:tabular-nums;color:#bfdbfe;font-weight:700}
  .empty{color:var(--mute);padding:40px;text-align:center}
  .err{color:#fca5a5;font-size:12px;margin-left:8px}
</style>
</head>
<body>
<header>
  <h1>🇺🇸 USMNT — FIFA World Cup 2026</h1>
  <p>Live tracker — fixtures, results, and bracket path. Auto-refreshes from ESPN.</p>
  <nav>
    <button data-view="calendar" class="active">Calendar</button>
    <button data-view="bracket">Bracket</button>
    <span class="refresh-info"><span class="live-dot"></span><span id="refresh-status">loading…</span></span>
  </nav>
</header>
<main>
  <section id="view-calendar">
    <div class="section-h"><h2>Schedule & Results</h2><span id="record" class="date"></span></div>
    <div id="cal" class="grid"><div class="empty">Loading live fixtures…</div></div>
  </section>
  <section id="view-bracket" hidden>
    <div class="section-h"><h2>Knockout Bracket — US Path</h2><span class="date">Round of 32 → Final</span></div>
    <div class="bracket" id="bracket"></div>
  </section>
</main>
<footer>Data: ESPN public scoreboard API · Auto-refreshes every 60s · Unofficial fan tracker</footer>
<script>
const ESPN = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260601-20260720";
const USA_NAMES = ["United States","USA","US"];
let matches = [];
let lastError = null;

function isUSA(team){
  if(!team) return false;
  const n = (team.displayName||team.name||team.shortDisplayName||"").toLowerCase();
  return n.includes("united states") || n==="usa" || n==="us";
}

function classify(comp){
  // returns {status, score, scoreUS, scoreOpp, opp, oppFlag, venue, stage, dateISO, isLive, completed}
  const competitors = comp.competitors||[];
  const us = competitors.find(c=>isUSA(c.team));
  const opp = competitors.find(c=>!isUSA(c.team));
  const status = comp.status||{};
  const state = status.type?.state; // pre, in, post
  const completed = !!status.type?.completed;
  const usScore = us?.score!=null ? parseInt(us.score,10) : null;
  const opScore = opp?.score!=null ? parseInt(opp.score,10) : null;
  let outcome = "upcoming";
  if(state==="in") outcome="live";
  else if(completed && usScore!=null && opScore!=null){
    if(usScore>opScore) outcome="W";
    else if(usScore<opScore) outcome="L";
    else outcome="D";
  }
  return {
    outcome, usScore, opScore,
    opp: opp?.team?.displayName || "TBD",
    oppAbbr: opp?.team?.abbreviation || "",
    venue: comp.venue?.fullName ? `${comp.venue.fullName}${comp.venue.address?.city?", "+comp.venue.address.city:""}` : "TBD",
    detail: status.type?.shortDetail || "",
    completed, state,
  };
}

async function loadData(){
  try{
    const res = await fetch(ESPN, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const events = (data.events||[]).filter(ev=>{
      const c = ev.competitions?.[0];
      return c && (c.competitors||[]).some(t=>isUSA(t.team));
    });
    matches = events.map(ev=>{
      const c = ev.competitions[0];
      const info = classify(c);
      return {
        id: ev.id,
        dateISO: ev.date,
        name: ev.name,
        shortName: ev.shortName,
        stage: ev.season?.slug || c.notes?.[0]?.headline || "",
        notes: (c.notes||[]).map(n=>n.headline).join(" · "),
        ...info,
      };
    }).sort((a,b)=>new Date(a.dateISO)-new Date(b.dateISO));
    lastError = null;
  }catch(e){
    lastError = e.message;
    console.error(e);
  }
  render();
  document.getElementById("refresh-status").textContent =
    lastError ? `error: ${lastError} — last try ${new Date().toLocaleTimeString()}`
              : `live · updated ${new Date().toLocaleTimeString()}`;
}

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}
function fmtTime(iso){
  return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"});
}

function render(){
  const cal = document.getElementById("cal");
  if(!matches.length){
    cal.innerHTML = `<div class="empty">No USA matches found in feed${lastError?` (${lastError})`:""}.</div>`;
    return;
  }
  cal.innerHTML = "";
  const next = matches.find(m=>m.outcome==="upcoming" || m.outcome==="live");
  matches.forEach(m=>{
    const isNext = m===next;
    let pill;
    if(m.outcome==="W") pill=`<span class="pill W">WIN ${m.usScore}–${m.opScore}</span>`;
    else if(m.outcome==="L") pill=`<span class="pill L">LOSS ${m.usScore}–${m.opScore}</span>`;
    else if(m.outcome==="D") pill=`<span class="pill D">DRAW ${m.usScore}–${m.opScore}</span>`;
    else if(m.outcome==="live") pill=`<span class="pill live">LIVE ${m.usScore??0}–${m.opScore??0} · ${m.detail}</span>`;
    else pill=`<span class="pill upcoming">Upcoming</span>`;
    const cd = isNext && m.outcome==="upcoming" ? `<div class="countdown" data-cd="${m.dateISO}"></div>` : "";
    cal.insertAdjacentHTML("beforeend", `
      <div class="card ${isNext?'next':''}">
        <div class="row"><span class="date">${fmtDate(m.dateISO)} · ${fmtTime(m.dateISO)}</span><span class="stage">${m.notes||"World Cup"}</span></div>
        <div class="match">🇺🇸 USA vs ${m.opp}</div>
        <div class="venue">${m.venue}</div>
        <div class="row" style="margin-top:10px">${pill}${cd}</div>
      </div>`);
  });
  const w=matches.filter(m=>m.outcome==="W").length,
        l=matches.filter(m=>m.outcome==="L").length,
        d=matches.filter(m=>m.outcome==="D").length;
  document.getElementById("record").textContent = `Record: ${w}W–${d}D–${l}L`;
  tickCountdowns();
}

let cdInterval;
function tickCountdowns(){
  clearInterval(cdInterval);
  const upd = ()=>{
    document.querySelectorAll("[data-cd]").forEach(el=>{
      const ms = new Date(el.dataset.cd).getTime() - Date.now();
      if(ms<=0){el.textContent="Kickoff!";return}
      const d=Math.floor(ms/864e5),h=Math.floor(ms/36e5)%24,m=Math.floor(ms/6e4)%60,s=Math.floor(ms/1e3)%60;
      el.textContent = `kickoff in ${d}d ${h}h ${m}m ${s}s`;
    });
  };
  upd(); cdInterval=setInterval(upd,1000);
}

const rounds = [
  {name:"Round of 32", ties:[["🇺🇸 USA (if D1 or D2)","Opponent TBD"]]},
  {name:"Round of 16", ties:[["Winner R32","Winner R32"]]},
  {name:"Quarterfinal", ties:[["Winner R16","Winner R16"]]},
  {name:"Semifinal", ties:[["Winner QF","Winner QF"]]},
  {name:"Final", ties:[["Winner SF","Winner SF"]]},
];
function renderBracket(){
  const el = document.getElementById("bracket"); el.innerHTML="";
  rounds.forEach(r=>{
    const col = document.createElement("div"); col.className="round";
    col.innerHTML = `<h3>${r.name}</h3>` + r.ties.map(t=>`
      <div class="tie"><div class="t">${t[0]}</div><div class="t">${t[1]}</div></div>`).join("");
    el.appendChild(col);
  });
}

document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    const v=b.dataset.view;
    document.getElementById("view-calendar").hidden = v!=="calendar";
    document.getElementById("view-bracket").hidden = v!=="bracket";
  };
});

renderBracket();
loadData();
setInterval(loadData, 60_000);
</script>
</body>
</html>
